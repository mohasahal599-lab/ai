<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude AI Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background-color: #2c2c2c;
            border-right: 1px solid #404040;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #404040;
        }

        .new-chat-btn {
            width: 100%;
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .new-chat-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.3);
        }

        .settings-btn {
            width: 100%;
            background-color: #666666;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 0.2s ease;
        }

        .settings-btn:hover {
            background-color: #777777;
        }

        .conversations-section {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .conversations-title {
            font-size: 12px;
            font-weight: 600;
            color: #888888;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .conversation-item {
            padding: 12px 16px;
            margin-bottom: 4px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 14px;
            color: #cccccc;
            border: 1px solid transparent;
        }

        .conversation-item:hover {
            background-color: #3c3c3c;
            color: #ffffff;
        }

        .conversation-item.active {
            background-color: #4CAF50;
            color: #ffffff;
        }

        /* Main Chat Area */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #1a1a1a;
        }

        .chat-header {
            padding: 20px;
            border-bottom: 1px solid #404040;
            background-color: #2c2c2c;
        }

        .chat-title {
            font-size: 18px;
            font-weight: 600;
            color: #ffffff;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            scroll-behavior: smooth;
        }

        .message {
            margin-bottom: 24px;
            display: flex;
            flex-direction: column;
        }

        .message-header {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }

        .message-role {
            font-weight: 600;
            font-size: 14px;
        }

        .message-role.user {
            color: #4CAF50;
        }

        .message-role.assistant {
            color: #2196F3;
        }

        .message-timestamp {
            font-size: 12px;
            color: #888888;
            margin-left: 12px;
        }

        .message-content {
            font-size: 15px;
            line-height: 1.6;
            color: #ffffff;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .message.error .message-content {
            color: #F44336;
        }

        /* Input Area */
        .input-area {
            padding: 20px;
            background-color: #2c2c2c;
            border-top: 1px solid #404040;
        }

        .input-container {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .input-field {
            flex: 1;
            background-color: #3c3c3c;
            border: 1px solid #555555;
            border-radius: 12px;
            padding: 12px 16px;
            color: #ffffff;
            font-size: 15px;
            font-family: inherit;
            resize: none;
            min-height: 24px;
            max-height: 120px;
            overflow-y: auto;
        }

        .input-field:focus {
            outline: none;
            border-color: #4CAF50;
            box-shadow: 0 0 0 2px rgba(76, 175, 80, 0.2);
        }

        .input-field::placeholder {
            color: #888888;
        }

        .send-btn {
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            min-width: 80px;
        }

        .send-btn:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.3);
        }

        .send-btn:disabled {
            background: #666666;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .status-indicator {
            font-size: 12px;
            color: #888888;
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-indicator.thinking {
            color: #FF9800;
        }

        .status-indicator.error {
            color: #F44336;
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid #404040;
            border-top: 2px solid #FF9800;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Settings Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
        }

        .modal-content {
            background-color: #2c2c2c;
            margin: 5% auto;
            padding: 0;
            border-radius: 12px;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid #404040;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
            color: #ffffff;
        }

        .modal-body {
            padding: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #ffffff;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            background-color: #3c3c3c;
            border: 1px solid #555555;
            border-radius: 8px;
            padding: 12px;
            color: #ffffff;
            font-size: 14px;
            font-family: inherit;
        }

        .form-input:focus {
            outline: none;
            border-color: #4CAF50;
            box-shadow: 0 0 0 2px rgba(76, 175, 80, 0.2);
        }

        .form-select {
            width: 100%;
            background-color: #3c3c3c;
            border: 1px solid #555555;
            border-radius: 8px;
            padding: 12px;
            color: #ffffff;
            font-size: 14px;
            font-family: inherit;
        }

        .modal-footer {
            padding: 20px;
            border-top: 1px solid #404040;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.3);
        }

        .btn-secondary {
            background-color: #666666;
            color: white;
        }

        .btn-secondary:hover {
            background-color: #777777;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .sidebar {
                width: 200px;
            }
            
            .conversation-item {
                font-size: 12px;
                padding: 10px 12px;
            }
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #2c2c2c;
        }

        ::-webkit-scrollbar-thumb {
            background: #555555;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #666666;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <button class="new-chat-btn" onclick="newConversation()">
                    <span>+</span> New Chat
                </button>
                <button class="settings-btn" onclick="openSettings()">
                    ⚙️ Settings
                </button>
            </div>
            <div class="conversations-section">
                <div class="conversations-title">Recent Chats</div>
                <div id="conversations-list"></div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <div class="chat-header">
                <div class="chat-title" id="chat-title">Claude AI Assistant</div>
            </div>
            <div class="chat-messages" id="chat-messages">
                <div class="message">
                    <div class="message-content">
                        Hello! I'm Claude, your AI assistant. How can I help you today?
                    </div>
                </div>
            </div>
            <div class="input-area">
                <div class="input-container">
                    <textarea 
                        id="message-input" 
                        class="input-field" 
                        placeholder="Type your message here... (Press Ctrl+Enter to send)"
                        rows="1"
                    ></textarea>
                    <button id="send-btn" class="send-btn" onclick="sendMessage()">Send</button>
                </div>
                <div class="status-indicator" id="status-indicator">Ready</div>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">Settings</div>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label" for="base-url">Base URL</label>
                    <input type="text" id="base-url" class="form-input" placeholder="https://agentrouter.org">
                </div>
                <div class="form-group">
                    <label class="form-label" for="auth-token">Auth Token</label>
                    <input type="password" id="auth-token" class="form-input" placeholder="Enter your API token">
                </div>
                <div class="form-group">
                    <label class="form-label" for="model">Model</label>
                    <select id="model" class="form-select">
                        <option value="claude-3-opus-20240229">Claude 3 Opus</option>
                        <option value="claude-3-sonnet-20240229">Claude 3 Sonnet</option>
                        <option value="claude-3-haiku-20240307">Claude 3 Haiku</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label" for="max-tokens">Max Tokens</label>
                    <input type="number" id="max-tokens" class="form-input" placeholder="1000" min="1" max="4000">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeSettings()">Cancel</button>
                <button class="btn btn-primary" onclick="saveSettings()">Save</button>
            </div>
        </div>
    </div>

    <script>
        let currentConversationId = null;
        let conversations = [];

        // Initialize the app
        document.addEventListener('DOMContentLoaded', function() {
            loadConversations();
            loadSettings();
            setupEventListeners();
        });

        function setupEventListeners() {
            const messageInput = document.getElementById('message-input');
            
            messageInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && e.ctrlKey) {
                    e.preventDefault();
                    sendMessage();
                } else if (e.key === 'Enter' && !e.ctrlKey) {
                    e.preventDefault();
                    // Allow Enter for new lines in textarea
                }
            });

            messageInput.addEventListener('input', function() {
                // Auto-resize textarea
                this.style.height = 'auto';
                this.style.height = Math.min(this.scrollHeight, 120) + 'px';
            });
        }

        async function loadConversations() {
            try {
                const response = await fetch('/api/conversations');
                conversations = await response.json();
                renderConversations();
            } catch (error) {
                console.error('Error loading conversations:', error);
            }
        }

        function renderConversations() {
            const container = document.getElementById('conversations-list');
            container.innerHTML = '';

            conversations.slice(-10).reverse().forEach(conv => {
                const item = document.createElement('div');
                item.className = 'conversation-item';
                if (conv.id === currentConversationId) {
                    item.classList.add('active');
                }
                item.textContent = conv.title;
                item.onclick = () => selectConversation(conv.id);
                container.appendChild(item);
            });
        }

        async function selectConversation(conversationId) {
            try {
                const response = await fetch(`/api/conversations/${conversationId}`);
                const conversation = await response.json();
                
                currentConversationId = conversationId;
                document.getElementById('chat-title').textContent = conversation.title;
                
                // Load conversation messages
                const messagesContainer = document.getElementById('chat-messages');
                messagesContainer.innerHTML = '';
                
                conversation.messages.forEach(msg => {
                    addMessageToChat(msg.role, msg.content, msg.timestamp);
                });
                
                renderConversations();
                scrollToBottom();
            } catch (error) {
                console.error('Error loading conversation:', error);
            }
        }

        async function newConversation() {
            try {
                const response = await fetch('/api/conversations', { method: 'POST' });
                const conversation = await response.json();
                
                conversations.push(conversation);
                currentConversationId = conversation.id;
                
                document.getElementById('chat-title').textContent = 'New Chat';
                document.getElementById('chat-messages').innerHTML = '';
                document.getElementById('message-input').focus();
                
                renderConversations();
            } catch (error) {
                console.error('Error creating conversation:', error);
            }
        }

        async function sendMessage() {
            const messageInput = document.getElementById('message-input');
            const message = messageInput.value.trim();
            
            if (!message) return;

            // Clear input and disable send button
            messageInput.value = '';
            messageInput.style.height = 'auto';
            const sendBtn = document.getElementById('send-btn');
            sendBtn.disabled = true;
            sendBtn.textContent = 'Sending...';

            // Add user message to chat
            addMessageToChat('user', message);
            updateStatus('Claude is thinking...', 'thinking');
            scrollToBottom();

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ message: message })
                });

                const data = await response.json();

                if (response.ok) {
                    addMessageToChat('assistant', data.response, data.timestamp);
                    currentConversationId = data.conversation_id;
                    await loadConversations(); // Refresh conversations list
                } else {
                    addMessageToChat('assistant', `Error: ${data.error}`, null, true);
                }
            } catch (error) {
                addMessageToChat('assistant', `Error: ${error.message}`, null, true);
            } finally {
                sendBtn.disabled = false;
                sendBtn.textContent = 'Send';
                updateStatus('Ready');
                messageInput.focus();
                scrollToBottom();
            }
        }

        function addMessageToChat(role, content, timestamp = null, isError = false) {
            const messagesContainer = document.getElementById('chat-messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isError ? 'error' : ''}`;

            const headerDiv = document.createElement('div');
            headerDiv.className = 'message-header';

            const roleSpan = document.createElement('span');
            roleSpan.className = `message-role ${role}`;
            roleSpan.textContent = role === 'user' ? 'You' : 'Claude';

            headerDiv.appendChild(roleSpan);

            if (timestamp) {
                const timestampSpan = document.createElement('span');
                timestampSpan.className = 'message-timestamp';
                timestampSpan.textContent = `[${timestamp}]`;
                headerDiv.appendChild(timestampSpan);
            }

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = content;

            messageDiv.appendChild(headerDiv);
            messageDiv.appendChild(contentDiv);
            messagesContainer.appendChild(messageDiv);
        }

        function updateStatus(text, type = '') {
            const statusIndicator = document.getElementById('status-indicator');
            statusIndicator.textContent = text;
            statusIndicator.className = `status-indicator ${type}`;
        }

        function scrollToBottom() {
            const messagesContainer = document.getElementById('chat-messages');
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // Settings functions
        async function loadSettings() {
            try {
                const response = await fetch('/api/settings');
                const settings = await response.json();
                
                document.getElementById('base-url').value = settings.base_url;
                document.getElementById('model').value = settings.model;
                document.getElementById('max-tokens').value = settings.max_tokens;
            } catch (error) {
                console.error('Error loading settings:', error);
            }
        }

        function openSettings() {
            document.getElementById('settings-modal').style.display = 'block';
        }

        function closeSettings() {
            document.getElementById('settings-modal').style.display = 'none';
        }

        async function saveSettings() {
            const settings = {
                base_url: document.getElementById('base-url').value,
                auth_token: document.getElementById('auth-token').value,
                model: document.getElementById('model').value,
                max_tokens: parseInt(document.getElementById('max-tokens').value)
            };

            try {
                const response = await fetch('/api/settings', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(settings)
                });

                if (response.ok) {
                    closeSettings();
                    alert('Settings saved successfully!');
                } else {
                    const error = await response.json();
                    alert(`Error saving settings: ${error.error}`);
                }
            } catch (error) {
                alert(`Error saving settings: ${error.message}`);
            }
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('settings-modal');
            if (event.target === modal) {
                closeSettings();
            }
        }
    </script>
</body>
</html>
